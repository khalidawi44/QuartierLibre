<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Aïcha Bassal présidente de NMH : gérera-t-elle les locataires comme les exilé·es ? Composition Quartier Libre.">
  <title>Aïcha Bassal / NMH / exilé·es — affiche Quartier Libre</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16100f"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- accent diagonal rouge -->
  <polygon points="1180,0 1600,0 1600,900 1360,900" fill="#e2001a" opacity="0.92"/>
  <polygon points="1320,0 1420,0 1180,900 1080,900" fill="#000000" opacity="0.18"/>
  <!-- barre rouge gauche -->
  <rect x="0" y="0" width="22" height="900" fill="#e2001a"/>

  <!-- marque -->
  <rect x="70" y="60" width="356" height="50" fill="#e2001a"/>
  <text x="90" y="96" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="3" fill="#ffffff">QUARTIER LIBRE</text>

  <!-- kicker jaune -->
  <text x="72" y="172" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" letter-spacing="5" fill="#f5c518">LOGEMENT SOCIAL · EXILÉ·ES · NANTES</text>

  <!-- TITRE multi-couleurs / multi-polices -->
  <text x="66" y="288" font-family="Arial Black, Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="-3" fill="#ffffff">AÏCHA BASSAL</text>
  <text x="70" y="366" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="62" font-weight="700" fill="#f5c518">présidente de NMH</text>

  <text x="70" y="470" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700" fill="#ffffff">Gérera-t-elle les locataires</text>
  <text x="66" y="556" font-family="Arial Black, Arial, sans-serif" font-size="74" font-weight="900" letter-spacing="-2" fill="#e2001a">COMME LES EXILÉ·ES ?</text>

  <!-- séparateur + étoile -->
  <rect x="70" y="628" width="900" height="4" fill="#e2001a"/>
  <text x="985" y="643" font-family="Georgia, serif" font-size="40" font-weight="900" fill="#e2001a">★</text>

  <!-- INFOS CLÉS -->
  <text x="72" y="704" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="#ffffff">13 MAI 2026　·　50 000 <tspan font-weight="400" fill="#cfcfcf">locataires</tspan></text>
  <text x="72" y="754" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="900" fill="#f5c518">38 922 <tspan fill="#ffffff" font-size="34">ménages en attente d'un HLM</tspan></text>
  <text x="72" y="806" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400" fill="#b8b8b8">Square Daviais &amp; lycée Leloup-Bouhier — la Ville a réclamé l'expulsion · 2018</text>

  <!-- emplacement photo (sera remplacé par ta photo) -->
  <text x="1300" y="470" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.85">[ TA PHOTO ICI ]</text>
</svg>
