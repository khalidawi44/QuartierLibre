<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Nantes, été 2018 : l'errance des exilé·es. Beaux-Arts, université, square Daviais, lycée Leloup-Bouhier. Le lycée : expulsion réclamée par la Ville de Nantes, propriétaire.">
  <title>Nantes 2018 — l'errance des exilé·es</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161616"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="26" height="900" fill="#c0392b"/>

  <!-- marque -->
  <rect x="90" y="84" width="430" height="50" fill="#c0392b"/>
  <text x="112" y="120" font-family="Arial, sans-serif" font-size="29" font-weight="800" letter-spacing="3" fill="#ffffff">QUARTIER LIBRE</text>

  <!-- surtitre -->
  <text x="90" y="210" font-family="Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="6" fill="#c0392b">NANTES · ÉTÉ 2018</text>

  <!-- titre -->
  <text x="86" y="320" font-family="Arial, sans-serif" font-size="92" font-weight="900" fill="#ffffff">L'ERRANCE</text>
  <text x="86" y="410" font-family="Arial, sans-serif" font-size="92" font-weight="900" fill="#ffffff">DES EXILÉ·ES</text>

  <!-- timeline -->
  <text x="92" y="500" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#b8b8b8">DE SITE EN SITE, D'EXPULSION EN EXPULSION :</text>
  <text x="92" y="552" font-family="Arial, sans-serif" font-size="33" font-weight="800" fill="#ffffff">Beaux-Arts → Université → Square Daviais</text>
  <text x="92" y="600" font-family="Arial, sans-serif" font-size="33" font-weight="800" fill="#ffffff">→ Lycée Leloup-Bouhier → retour au square</text>

  <!-- chiffre -->
  <text x="92" y="680" font-family="Arial, sans-serif" font-size="34" font-weight="400" fill="#b8b8b8">jusqu'à <tspan font-weight="900" fill="#c0392b" font-size="44">500</tspan> personnes sans toit · square évacué le 18 juillet</text>

  <!-- séparateur -->
  <rect x="90" y="730" width="1420" height="3" fill="#c0392b"/>

  <!-- punch -->
  <text x="90" y="792" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Le lycée Leloup-Bouhier ?</text>
  <text x="90" y="840" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="#e8e8e8">Expulsion réclamée par la <tspan font-weight="800" fill="#c0392b">Ville de Nantes</tspan>, propriétaire des murs.</text>
</svg>
