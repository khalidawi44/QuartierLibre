<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Aïcha Bassal prend le logement social. En 2018, la même Ville faisait expulser les exilé·es. Gérera-t-elle les locataires autrement ? 50 000 locataires, 38 922 ménages en attente. Square Daviais et lycée Leloup-Bouhier, été 2018.">
  <title>Aïcha Bassal / logement social / exilé·es 2018 — Quartier Libre</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121212"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="22" height="900" fill="#e2001a"/>

  <!-- marque -->
  <rect x="70" y="64" width="356" height="50" fill="#e2001a"/>
  <text x="90" y="100" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="3" fill="#ffffff">QUARTIER LIBRE</text>
  <text x="448" y="100" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="4" fill="#8a8a8a">NANTES</text>

  <!-- titre -->
  <text x="66" y="232" font-family="Arial Black, Arial, sans-serif" font-size="118" font-weight="900" letter-spacing="-3" fill="#ffffff">AÏCHA BASSAL</text>
  <text x="70" y="298" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="800" letter-spacing="1" fill="#ffffff">PREND LE LOGEMENT SOCIAL</text>

  <!-- bandeau rouge : le punch sourcé -->
  <rect x="70" y="352" width="1460" height="150" fill="#e2001a"/>
  <text x="96" y="416" font-family="Arial Black, Arial, sans-serif" font-size="46" font-weight="900" letter-spacing="-1" fill="#ffffff">EN 2018, LA MÊME VILLE</text>
  <text x="96" y="472" font-family="Arial Black, Arial, sans-serif" font-size="46" font-weight="900" letter-spacing="-1" fill="#ffffff">FAISAIT EXPULSER LES EXILÉ·ES</text>

  <!-- question -->
  <text x="70" y="592" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#ffffff">Gérera-t-elle les locataires <tspan fill="#e2001a">autrement</tspan> ?</text>

  <!-- séparateur -->
  <rect x="70" y="700" width="1460" height="4" fill="#e2001a"/>

  <!-- chiffres / faits -->
  <text x="70" y="762" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" fill="#ffffff">50 000 <tspan font-weight="400" fill="#b8b8b8" font-size="32">locataires</tspan>　·　38 922 <tspan font-weight="400" fill="#b8b8b8" font-size="32">ménages en attente d'un HLM</tspan></text>
  <text x="70" y="812" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" fill="#8a8a8a">Square Daviais &amp; lycée Leloup-Bouhier — été 2018</text>
</svg>
