<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Logement social à Nantes : 38 922 ménages en attente d'un HLM. Aïcha Bassal élue présidente de Nantes Métropole Habitat, mai 2026.">
  <title>Logement social à Nantes — 38 922 ménages en attente</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- barre rouge gauche -->
  <rect x="0" y="0" width="26" height="900" fill="#c0392b"/>
  <!-- bandeau marque -->
  <rect x="90" y="92" width="430" height="52" fill="#c0392b"/>
  <text x="112" y="129" font-family="Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="3" fill="#ffffff">QUARTIER LIBRE</text>

  <!-- surtitre -->
  <text x="90" y="250" font-family="Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="1" fill="#e8e8e8">LOGEMENT SOCIAL À NANTES</text>

  <!-- chiffre choc -->
  <text x="82" y="500" font-family="Arial, sans-serif" font-size="280" font-weight="900" fill="#c0392b">38 922</text>

  <!-- explication chiffre -->
  <text x="90" y="585" font-family="Arial, sans-serif" font-size="50" font-weight="700" fill="#ffffff">ménages en attente d'un HLM</text>
  <text x="90" y="645" font-family="Arial, sans-serif" font-size="34" font-weight="400" fill="#b8b8b8">au 1er janvier 2025 — délai « anormalement long » : 30 mois</text>

  <!-- séparateur -->
  <rect x="90" y="710" width="1420" height="3" fill="#c0392b"/>

  <!-- bas : l'actu -->
  <text x="90" y="775" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff">Aïcha Bassal présidente de Nantes Métropole Habitat</text>
  <text x="90" y="822" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="#b8b8b8">26 000 logements, 50 000 habitant·es — élue le 13 mai 2026</text>
</svg>
